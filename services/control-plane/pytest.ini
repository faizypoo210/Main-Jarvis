[pytest]
testpaths = tests
markers =
    integration: PostgreSQL + Alembic (full ASGI client; see docs/TESTING.md)
    unit: Fast deterministic tests (schemas/helpers; no live DB required for the test body)
asyncio_mode = auto
# One event loop per session — asyncpg + httpx ASGI must not hop loops (notably on Windows).
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
filterwarnings =
    ignore::DeprecationWarning

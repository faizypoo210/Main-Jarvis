# Baseline CI: control-plane pytest + command-center production build.
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  control-plane-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jarvis_cp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d jarvis_cp_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/control-plane/requirements.txt

      - name: Install Python dependencies
        working-directory: services/control-plane
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run control-plane tests
        working-directory: services/control-plane
        env:
          PYTEST_CONTROL_PLANE_DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/jarvis_cp_test
          PYTEST_CONTROL_PLANE_API_KEY: ci-test-control-plane-api-key
          SECRET_KEY: ci-test-secret-key-not-for-production
        run: python -m pytest tests/ -v --tb=short

  command-center-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/command-center/package-lock.json

      - name: Install, test, and build Command Center
        working-directory: services/command-center
        run: |
          npm ci
          npm run test
          npm run build
